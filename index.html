<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css" />
    <title>Registro</title>
</head>
<body>

    <!-- Contenedor Principal -->
    <div class="container">

        <!-- Header / Navegación -->
        <header class="header">
    <div class="nav-container">
        <div class="brand">
            <h2>Mi Sitio Web</h2>
        </div>
        <nav class="nav">
            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Pager</a></li>
                <li><a href="#">Registros</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Login</a></li>
            </ul>
        </nav>
    </div>
</header>

        <!-- Contenido Principal -->
        <main class="main">

            <section class="registro">
                <header class="registro-header">
                    <h1>Registrarse</h1>
                </header>

                <form class="formulario">

                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre Completo">
                    </div>

                    <div class="form-group">
                        <label for="correo">Correo Electronico</label>
                        <input type="email" id="correo" name="correo" placeholder="Correo Electronico">
                    </div>

                    <div class="form-group">
                        <label for="usuario">Nombre de Usuario</label>
                        <input type="text" id="usuario" name="usuario" placeholder="Nombre de Usuario">
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Contraseña">
                    </div>

                    <div class="form-group">
                        <label for="fecha">Fecha de Nacimiento</label>
                        <input type="date" id="fecha" name="fecha">
                    </div>

                    <div class="form-group">
                        <button type="submit">Crear Cuenta</button>
                    </div>

                </form>
            </section>

        </main>

    </div>
<footer class="footer">
    <div class="footer-content">
        <p><strong>Programador:</strong> Francisco Paredes Vargas</p>
        <p><strong>Matrícula:</strong> 22200199</p>
        <p>&copy; 2026 - Proyecto Diseño Web</p>
    </div>
</footer>
</body>
</html>
